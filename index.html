<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitelity Bonus Promo</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --dark-blue: #000c18;
            --electric-blue: #00d2ff;
            --royal-blue: #3a7bd5;
            --gold: #ffcc00;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 10, 20, 0.85), rgba(0, 10, 20, 0.85)), 
                        url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            margin-bottom: 15px;
            z-index: 10;
        }

        .logo-img {
            height: 90px;
            width: auto;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.6));
        }

        .promo-header h1 {
            font-size: 3.5rem;
            margin: 0 0 25px 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, var(--electric-blue) 50%, var(--royal-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0, 210, 255, 0.6));
            text-align: center;
            letter-spacing: 1px;
        }

        .wheel-outer-frame {
            position: relative;
            padding: 22px;
            background: conic-gradient(from 45deg, #d4af37, #f7ef8a, #d4af37, #f7ef8a, #d4af37);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0, 210, 255, 0.4);
        }

        .wheel-container {
            position: relative;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            overflow: hidden;
            border: 10px solid var(--dark-blue);
            background: var(--dark-blue);
        }

        #wheel {
            width: 100%;
            height: 100%;
            transition: transform 8s cubic-bezier(0.1, 0, 0, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 60px;
            background: linear-gradient(to bottom, #ff4136, #800000);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 40;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        .center-cap {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: radial-gradient(circle, #444, #111);
            border: 4px solid var(--gold);
            border-radius: 50%;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 2.2rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #spin-btn {
            margin-top: 40px;
            padding: 20px 80px;
            font-size: 1.8rem;
            color: white;
            text-transform: uppercase;
            background: linear-gradient(180deg, var(--royal-blue) 0%, var(--dark-blue) 100%);
            border: 2px solid var(--electric-blue);
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
            transition: all 0.2s;
            z-index: 10;
        }

        #spin-btn:hover { transform: scale(1.05); }
        #spin-btn:active { transform: scale(0.95); }
        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .win-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 4, 8, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.8s;
        }

        .win-content {
            background: white;
            padding: 70px;
            border-radius: 50px;
            text-align: center;
            border: 12px solid var(--royal-blue);
            transform: scale(0.4);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 80px rgba(0, 210, 255, 0.5);
        }

        .show-modal { display: flex; opacity: 1; }
        .show-modal .win-content { transform: scale(1); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/7dSVZ1K5/logo.png" alt="Bitelity Logo" class="logo-img">
    </div>

    <div class="promo-header">
        <h1>Bitelity Bonus Promo</h1>
    </div>

    <div class="wheel-outer-frame">
        <div class="pointer"></div>
        <div class="center-cap">B</div>
        <div class="wheel-container">
            <canvas id="wheel" width="480" height="480"></canvas>
        </div>
    </div>

    <button id="spin-btn">Spin to Win</button>

    <div id="win-modal" class="win-modal">
        <div class="win-content">
            <h2 style="color: var(--royal-blue); margin: 0; letter-spacing: 2px;">BIG WINNER!</h2>
            <h1 id="win-amount" style="font-size: 7rem; margin: 20px 0; color: #111;">€0</h1>
            <p style="font-size: 1.8rem; color: #444;">Bonus credited to Bitelity Account</p>
            <button onclick="closeModal()" style="padding: 10px 30px; cursor: pointer; border-radius: 10px; border: none; background: var(--royal-blue); color: white;">Continue</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const modal = document.getElementById('win-modal');
        const winAmountText = document.getElementById('win-amount');

        const bonuses = ["€200", "€400", "€500", "€800", "€1000", "€1500", "€1800", "€2000"];
        const colors = ["#001529", "#0074d9"];
        const totalSectors = bonuses.length;
        const arc = (2 * Math.PI) / totalSectors;

        // Sequence logic
        const sequence = ["€1800", "€2000", "€1500", "€200", "€500", "€2000"];
        let currentSequenceIndex = 0;
        let currentTotalRotation = 0;

        function draw() {
            for (let i = 0; i < totalSectors; i++) {
                const angle = i * arc;
                ctx.fillStyle = colors[i % 2];
                ctx.beginPath();
                ctx.moveTo(240, 240);
                ctx.arc(240, 240, 240, angle, angle + arc);
                ctx.fill();

                ctx.save();
                ctx.translate(240, 240);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 28px sans-serif";
                ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                ctx.shadowBlur = 5;
                ctx.fillText(bonuses[i], 220, 10);
                ctx.restore();
            }
        }

        draw();

        function closeModal() {
            modal.classList.remove('show-modal');
            btn.disabled = false;
        }

        btn.addEventListener('click', () => {
            btn.disabled = true;
            
            // Get current target from sequence
            const targetValue = sequence[currentSequenceIndex];
            const targetIndex = bonuses.indexOf(targetValue);
            
            const degreesPerSlice = 360 / totalSectors;
            const fullSpins = 360 * 10; // Extra spins for effect
            
            // Calculate the specific rotation to land on the target index
            // Formula: Full rotations + (offset to align index with top pointer)
            // We subtract the currentTotalRotation to ensure it always spins forward
            const targetRotation = (targetIndex * degreesPerSlice);
            const landingPoint = 360 - targetRotation - (degreesPerSlice / 2) - 90;
            
            currentTotalRotation += fullSpins + (landingPoint - (currentTotalRotation % 360) + 360) % 360;

            canvas.style.transform = `rotate(${currentTotalRotation}deg)`;

            setTimeout(() => {
                winAmountText.innerText = targetValue;
                modal.classList.add('show-modal');
                
                // Confetti Burst
                const duration = 5 * 1000;
                const animationEnd = Date.now() + duration;
                (function frame() {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return;
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00d2ff', '#ffffff'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3a7bd5', '#ffffff'] });
                    requestAnimationFrame(frame);
                }());

                // Increment sequence index or reset
                currentSequenceIndex++;
                if (currentSequenceIndex >= sequence.length) {
                    currentSequenceIndex = 0;
                }
            }, 8200);
        });
    </script>
</body>
</html>
